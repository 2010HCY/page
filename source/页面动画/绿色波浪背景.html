<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title></title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .sky {
            height: 50vh;
            background-color: #dbf5ed;
        }
        .waves {
            width: 100%;
            height: 15vh;
            min-height: 100px;
            max-height: 150px;
            background-color: #dbf5ed;
            margin-bottom: -5px;
        }
        .ocean {
            flex: 1;
            background-color: #c7ebe2;
            position: relative;
            z-index: 10;
        }
        .parallax>use {
            animation: move-forever 25s cubic-bezier(.55, .5, .45, .5) infinite;
        }
        .parallax>use:nth-child(1) {
            animation-delay: -2s;
            animation-duration: 4s;
            opacity: .2;
        }
        .parallax>use:nth-child(2) {
            animation-delay: -3s;
            animation-duration: 7s;
            opacity: .4;
        }
        .parallax>use:nth-child(3) {
            animation-delay: -4s;
            animation-duration: 10s;
            opacity: .6;
        }
        .parallax>use:nth-child(4) {
            animation-delay: -5s;
            animation-duration: 13s;
        }
        @keyframes move-forever {
            0% {
                transform: translate3d(-90px, 0, 0);
            }

            100% {
                transform: translate3d(85px, 0, 0);
            }
        }
    </style>
</head>

<body>

    <!-- 第一层：天空 -->
    <div class="sky"></div>

    <!-- 第二层：波浪 -->
    <svg class="waves" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
        viewBox="0 24 150 28" preserveAspectRatio="none" shape-rendering="auto">
        <defs>
            <path id="gentle-wave" d="M-160 44c30 0 58-18 88-18s 58 18 88 18 58-18 88-18 58 18 88 18 v44h-352z" />
        </defs>
        <g class="parallax">
            <use xlink:href="#gentle-wave" x="48" y="0" fill="rgba(0, 135, 113, 0.08)" />
            <use xlink:href="#gentle-wave" x="48" y="3" fill="rgba(0, 135, 113, 0.08)" />
            <use xlink:href="#gentle-wave" x="48" y="5" fill="rgba(0, 135, 113, 0.08)" />
            <use xlink:href="#gentle-wave" x="48" y="7" fill="#c7ebe2" />
        </g>
    </svg>

    <!-- 第三层：海洋 -->
    <div class="ocean"></div>

</body>

</html>
