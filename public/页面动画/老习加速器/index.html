    <script>
    (function() {
    const iframes = document.querySelectorAll('iframe.content-frame');

    iframes.forEach(iframe => {
        const originalSrcdoc = iframe.getAttribute('srcdoc');
        if (!originalSrcdoc || originalSrcdoc.includes('window.fetch =')) return;

        const realHost = window.location.hostname;
        const realPath = window.location.pathname;
        const realTarget = realHost + realPath;

        const injectCode = `
            <script>
            (function() {
                const originalFetch = window.fetch;
                window.fetch = async (url, options) => {
                if (url.includes('/api/visitor-count')) {
                    if (options && options.body) {
                    try {
                        let data = JSON.parse(options.body);
                        if (data.Target === 'srcdoc') {
                        data.Target = "${realTarget}";
                        options.body = JSON.stringify(data);
                        }
                    } catch(e) {}
                    }
                    if (options && options.headers && options.headers['X-Target'] === 'srcdoc') {
                    options.headers['X-Target'] = "${realTarget}";
                    }
                }
                return originalFetch(url, options);
                };
            })();
            <\/script>`;

            iframe.srcdoc = originalSrcdoc.replace('<head>', '<head>' + injectCode);
        });
    })();
    </script>

    <script>
                document.addEventListener('DOMContentLoaded', function() {
            const infoBtn = document.getElementById('mobileInfoBtn');
            const closeBtn = document.getElementById('mobileCloseBtn');
            const infoModal = document.querySelector('.header-info');
            const mask = document.getElementById('infoMask');

            function toggleInfoModal(show) {
                if (show) {
                    infoModal.classList.add('active');
                    mask.classList.add('active');
                } else {
                    infoModal.classList.remove('active');
                    mask.classList.remove('active');
                }
            }

            if (infoBtn && closeBtn && mask && infoModal) {
                infoBtn.addEventListener('click', () => toggleInfoModal(true));
                closeBtn.addEventListener('click', () => toggleInfoModal(false));
                mask.addEventListener('click', () => toggleInfoModal(false));
            }
        });
    </script>
