<html lang=&quot;zh&quot;>
<head>
    <meta charset=&quot;UTF-8&quot;>
    <title>Lep在线查看示例</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #fff; color: #111; margin: 0; padding: 40px; }

</head>
<body>

    <div class=&quot;header&quot;>
        <h1>Lep在线查看示例</h1>
        <div class=&quot;engine-switch&quot; id=&quot;engineSwitch&quot;>
            <button class=&quot;engine-btn&quot; data-type=&quot;compat&quot;>兼容模式</button>
            <button class=&quot;engine-btn&quot; data-type=&quot;simd&quot;>SIMD</button>
        </div>
    </div>

    <div class=&quot;gallery&quot; id=&quot;gallery&quot;>
        <div class=&quot;card&quot; data-src=&quot;1.lep&quot;>
            <div class=&quot;card-img-box&quot;>
                <span class=&quot;status-text&quot;>等待加载...</span>
                <img alt=&quot;decoded&quot;>
            </div>
            <div class=&quot;card-footer&quot;>
                <span>1.lep</span>
                <span class=&quot;time-label&quot;>-</span>
            </div>
        </div>
        <div class=&quot;card&quot; data-src=&quot;2.lep&quot;>
            <div class=&quot;card-img-box&quot;>
                <span class=&quot;status-text&quot;>等待加载...</span>
                <img alt=&quot;decoded&quot;>
            </div>
            <div class=&quot;card-footer&quot;>
                <span>2.lep</span>
                <span class=&quot;time-label&quot;>-</span>
            </div>
        </div>
    </div>

    <script type=&quot;module&quot;>
        import { simd } from &quot;https://unpkg.com/wasm-feature-detect?module&quot;;

        const engineBtns = document.querySelectorAll('.engine-btn');
        let worker = null;
        let pendingTasks = new Map();
        let taskId = 0;

        // 检测是否支持SIMD
        simd().then(isSupported => {
            console.log(`SIMD: ${isSupported}`);
            const initialMode = isSupported ? 'simd' : 'compat';
            setEngineMode(initialMode);
        });

        engineBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const targetMode = btn.getAttribute('data-type');
                setEngineMode(targetMode);
            });
        });

        function setEngineMode(mode) {
            engineBtns.forEach(btn => {
                if (btn.getAttribute('data-type') === mode) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });

            if (worker) {
                worker.terminate();
                worker = null;
                pendingTasks.clear();
            }

            document.querySelectorAll('.card').forEach(card => {
                card.querySelector('img').style.display = 'none';
                card.querySelector('.status-text').style.display = 'block';
                card.querySelector('.status-text').textContent = '初始化引擎...';
                card.querySelector('.time-label').textContent = '-';
            });

            const folder = mode === 'simd' ? 'pkg-simd' : 'pkg';
            const wasmModuleUrl = new URL(`./${folder}/lepton_wasm.js`, document.baseURI).href;

            const workerScript = `
                import init, { lep_to_jpg } from '${wasmModuleUrl}';
                
                init().then(() => {
                    postMessage({ type: 'ready' });
                }).catch(err => {
                    postMessage({ type: 'error', message: err.toString() });
                });

                self.onmessage = (e) => {
                    const { id, data, filename } = e.data;
                    const start = performance.now();
                    try {
                        const result = lep_to_jpg(data);
                        const time = performance.now() - start;
                        postMessage({ id, status: 'success', result, time, filename });
                    } catch (err) {
                        postMessage({ id, status: 'error', message: err.toString(), filename });
                    }
                };
            `;

            const blob = new Blob([workerScript], { type: 'application/javascript' });
            worker = new Worker(URL.createObjectURL(blob), { type: 'module' });

            worker.onmessage = (e) => {
                const data = e.data;
                if (data.type === 'ready') {
                    startLoadingImages();
                } else if (data.status === 'success') {
                    const task = pendingTasks.get(data.id);
                    if (task) {
                        console.log(`解码 ${data.filename} ${data.time.toFixed(2)}ms`);

                        const blob = new Blob([data.result], { type: 'image/jpeg' });
                        const imgUrl = URL.createObjectURL(blob);
                        
                        task.card.querySelector('.status-text').style.display = 'none';
                        const img = task.card.querySelector('img');
                        img.src = imgUrl;
                        img.style.display = 'block';
                        task.card.querySelector('.time-label').textContent = `${data.time.toFixed(0)} ms`;
                        
                        pendingTasks.delete(data.id);
                    }
                }
            };
        }

        async function startLoadingImages() {
            const cards = document.querySelectorAll('.card');
            for (const card of cards) {
                const src = card.getAttribute('data-src');
                const textEl = card.querySelector('.status-text');
                textEl.textContent = '读取文件...';

                try {
                    const response = await fetch(src);
                    if (!response.ok) throw new Error(&quot;HTTP &quot; + response.status);
                    const arrayBuffer = await response.arrayBuffer();
                    
                    textEl.textContent = '解码中...';
                    const currentId = taskId++;
                    pendingTasks.set(currentId, { card });

                    worker.postMessage({
                        id: currentId,
                        data: new Uint8Array(arrayBuffer),
                        filename: src
                    });
                } catch (err) {
                    textEl.textContent = '读取失败';
                }
            }
        }
    </script>

                document.addEventListener('DOMContentLoaded', function() {
            const infoBtn = document.getElementById('mobileInfoBtn');

            const mask = document.getElementById('infoMask');

            function toggleInfoModal(show) {
                if (show) {
                    infoModal.classList.add('active');
                    mask.classList.add('active');
                } else {
                    infoModal.classList.remove('active');
                    mask.classList.remove('active');
                }
            }

            if (infoBtn && closeBtn && mask && infoModal) {
                infoBtn.addEventListener('click', () => toggleInfoModal(true));
                closeBtn.addEventListener('click', () => toggleInfoModal(false));
                mask.addEventListener('click', () => toggleInfoModal(false));
            }
        });
    </script>
