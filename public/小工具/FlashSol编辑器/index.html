                    <input type=&quot;text&quot; id=&quot;search_input&quot; placeholder=&quot;搜索...&quot;>
                    <button id=&quot;search_clear_btn&quot; style=&quot;display:none&quot;>
                        <svg class=&quot;clear-icon&quot; xmlns=&quot;http://www.w3.org/2000/svg&quot; viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;2&quot; stroke-linecap=&quot;round&quot; stroke-linejoin=&quot;round&quot;><line x1=&quot;18&quot; y1=&quot;6&quot; x2=&quot;6&quot; y2=&quot;18&quot;/><line x1=&quot;6&quot; y1=&quot;6&quot; x2=&quot;18&quot; y2=&quot;18&quot;/></svg>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class=&quot;central-panel&quot;>
        <div id=&quot;dropzone_container&quot; style=&quot;display:block;&quot;>
            <div id=&quot;dropzone&quot;>
                <div>拖拽 Sol 文件到这里进行解析<br>或点击“新增变量”新建一个Sol文件</div>
            </div>
        </div>
        <div id=&quot;path_bar_container&quot; class=&quot;path-bar-container&quot; style=&quot;display:none;&quot;>
            <div class=&quot;path-bar&quot; id=&quot;path_bar&quot;></div>
        </div>
        <div id=&quot;table_container&quot; class=&quot;table-container&quot; style=&quot;display:none&quot;>
            <table class=&quot;sol-table&quot;>
                <colgroup>
                    <col style=&quot;width: 25%;&quot;>
                    <col style=&quot;width: 35%;&quot;>
                    <col style=&quot;width: 40%;&quot;>
                </colgroup>
                <thead>
                    <tr>
                        <th>变量名</th>
                        <th>路径</th>
                        <th>值</th>
                    </tr>
                </thead>
                <tbody id=&quot;table_body&quot;>
                </tbody>
            </table>
        </div>
    </main>

    <div id=&quot;modal_overlay&quot; class=&quot;modal-overlay&quot; style=&quot;display:none&quot;></div>
    <div id=&quot;context_menu&quot; class=&quot;context-menu&quot; style=&quot;display:none&quot;></div>
    <div id=&quot;path_dropdown_menu&quot; class=&quot;context-menu&quot; style=&quot;display:none&quot;></div>

    <script type=&quot;module&quot;>
        import init, { parse_sol, serialize_sol } from './SolEditor.js';

        const state = {
            filepath: null,
            rawBytes: null,
            elements: [],
            encoding: &quot;AMF0&quot;,
            selectedPath: null,
            selectedPathArr: null,
            searchText: &quot;&quot;,
            filterMatchName: true,
            filterMatchPath: true,
            filterMatchValue: true,
            editModal: null,
            newModal: null,
            viewMode: &quot;nested&quot;,
            currentPathArr: []
        };

        function getCurrentFolderElements() {
            let current = state.elements;
            for (const seg of state.currentPathArr) {
                const found = current.find(e => e.name === seg);
                if (found &amp;&amp; found.value &amp;&amp; typeof found.value === 'object' &amp;&amp; 'Object' in found.value) {
                    current = found.value.Object;
                } else {
                    return [];
                }
            }
            return current;
        }

        function getFolderByPathArr(elements, pathArr) {
            if (!pathArr || pathArr.length === 0) return elements;
            let current = elements;
            for (const seg of pathArr) {
                const found = current.find(e => e.name === seg);
                if (!found) return null;
                if (found.value &amp;&amp; typeof found.value === 'object' &amp;&amp; 'Object' in found.value) {
                    current = found.value.Object;
                } else {
                    return null;
                }
            }
            return current;
        }

        function deleteElementByPathArr(pathArr) {
            if (!pathArr || pathArr.length === 0) return false;
            const parentArr = pathArr.slice(0, -1);
            const targetName = pathArr[pathArr.length - 1];
            const folder = getFolderByPathArr(state.elements, parentArr);
            if (folder) {
                const idx = folder.findIndex(e => e.name === targetName);
                if (idx !== -1) {
                    folder.splice(idx, 1);
                    return true;
                }
            }
            return false;
        }

        function collectCurrentFolderRecursively(elements, prefixArr, result) {
            for (const el of elements) {
                const currentPathArr = [...prefixArr, el.name];
                result.push({ pathArr: currentPathArr, el: el });
                if (el.value &amp;&amp; typeof el.value === 'object' &amp;&amp; 'Object' in el.value) {
                    collectCurrentFolderRecursively(el.value.Object, currentPathArr, result);
                }
            }
        }

        async function run() {
            try {
                await init({ module_or_path: './SolEditor.wasm' });
                setupStaticEvents();
                render();
            } catch (err) {
                console.error(&quot;WASM 加载失败:&quot;, err);
                alert(&quot;WASM 加载失败，这可能是网络的问题，可刷新试试。&quot;);
            }
        }

        function setupStaticEvents() {
            const fileInput = document.getElementById(&quot;file_input&quot;);
            document.getElementById(&quot;btn_open&quot;).onclick = () => fileInput.click();
            fileInput.onchange = async (e) => {
                if (e.target.files &amp;&amp; e.target.files.length > 0) {
                    await loadFile(e.target.files[0]);
                }
            };

            document.getElementById(&quot;btn_save&quot;).onclick = () => saveFile();

            document.getElementById(&quot;btn_new&quot;).onclick = () => openNewModal();
            document.getElementById(&quot;btn_edit&quot;).onclick = () => openEditForSelected();

            document.getElementById(&quot;select_view_mode&quot;).onchange = (e) => setViewMode(e.target.value);

            window.addEventListener(&quot;click&quot;, () => {
                hideContextMenu();
                hidePathDropdown();
            });

            const tableContainer = document.getElementById(&quot;table_container&quot;);
            tableContainer.oncontextmenu = (e) => {
                const hasData = state.filepath !== null || state.elements.length > 0;
                if (!hasData) return;

                e.preventDefault();
                hidePathDropdown();

                const tr = e.target.closest(&quot;tr&quot;);
                if (tr &amp;&amp; tr.parentNode.tagName === &quot;TBODY&quot;) {
                    const path = tr.dataset.path;
                    if (path) {
                        const items = getDisplayItems();
                        const item = items.find(it => it.path === path);
                        if (item) {
                            state.selectedPath = item.path;
                            state.selectedPathArr = item.pathArr;
                            render();
                            showContextMenu(e.clientX, e.clientY, item);
                            return;
                        }
                    }
                }
                showContextMenu(e.clientX, e.clientY, null);
            };

            document.getElementById(&quot;chk_match_name&quot;).onchange = (e) => {
                state.filterMatchName = e.target.checked;
                render();
            };
            document.getElementById(&quot;chk_match_path&quot;).onchange = (e) => {
                state.filterMatchPath = e.target.checked;
                render();
            };
            document.getElementById(&quot;chk_match_value&quot;).onchange = (e) => {
                state.filterMatchValue = e.target.checked;
                render();
            };

            const searchInput = document.getElementById(&quot;search_input&quot;);
            const searchClearBtn = document.getElementById(&quot;search_clear_btn&quot;);
            searchInput.oninput = (e) => {
                state.searchText = e.target.value;
                searchClearBtn.style.display = state.searchText ? &quot;block&quot; : &quot;none&quot;;
                render();
            };
            searchClearBtn.onclick = () => {
                searchInput.value = &quot;&quot;;
                state.searchText = &quot;&quot;;
                searchClearBtn.style.display = &quot;none&quot;;
                searchInput.blur();
                render();
            };

            const dropzone = document.getElementById(&quot;dropzone&quot;);
            window.ondragover = (e) => e.preventDefault();
            window.ondrop = async (e) => {
                e.preventDefault();
                if (e.dataTransfer.files &amp;&amp; e.dataTransfer.files.length > 0) {
                    await loadFile(e.dataTransfer.files[0]);
                }
            };
            dropzone.ondragover = (e) => {
                e.preventDefault();
                dropzone.classList.add(&quot;dragover&quot;);
            };
            dropzone.ondragleave = () => dropzone.classList.remove(&quot;dragover&quot;);
            dropzone.ondrop = async (e) => {
                e.preventDefault();
                dropzone.classList.remove(&quot;dragover&quot;);
                if (e.dataTransfer.files &amp;&amp; e.dataTransfer.files.length > 0) {
                    await loadFile(e.dataTransfer.files[0]);
                }
            };
            dropzone.onclick = () => fileInput.click();
            
            initResizableColumns(); 
            window.addEventListener('resize', positionResizers);
        }

        async function loadFile(file) {
            try {
                const arrayBuffer = await file.arrayBuffer();
                const bytes = new Uint8Array(arrayBuffer);
                const result = parse_sol(bytes);

                state.filepath = file.name;
                state.rawBytes = bytes;
                state.elements = result.elements;
                state.encoding = result.encoding;
                state.selectedPath = null;
                state.selectedPathArr = null;
                state.currentPathArr = [];
                render();
            } catch (err) {
                alert(&quot;加载失败: &quot; + err);
            }
        }

        function setViewMode(mode) {
            state.viewMode = mode;
            state.selectedPath = null;
            state.selectedPathArr = null;
            
            const selectViewMode = document.getElementById(&quot;select_view_mode&quot;);
            if (selectViewMode &amp;&amp; selectViewMode.value !== mode) {
                selectViewMode.value = mode;
            }
            render();
        }

        function showPathDropdown(anchor, index) {
            const menu = document.getElementById(&quot;path_dropdown_menu&quot;);
            menu.innerHTML = &quot;&quot;;
            
            const pathArrAtNode = state.currentPathArr.slice(0, index);
            const folderElements = getFolderByPathArr(state.elements, pathArrAtNode);
            if (!folderElements) return;

            const subFolders = folderElements.filter(el => el.value &amp;&amp; typeof el.value === 'object' &amp;&amp; 'Object' in el.value);

            if (subFolders.length === 0) {
                const emptyItem = document.createElement(&quot;div&quot;);
                emptyItem.className = &quot;context-menu-item disabled&quot;;
                emptyItem.innerText = &quot;(无子目录)&quot;;
                menu.appendChild(emptyItem);
            } else {
                subFolders.forEach(el => {
                    const item = document.createElement(&quot;div&quot;);
                    item.className = &quot;context-menu-item&quot;;
                    item.innerText = el.name;
                    item.onclick = (e) => {
                        e.stopPropagation();
                        state.currentPathArr = [...pathArrAtNode, el.name];
                        state.selectedPath = null;
                        state.selectedPathArr = null;
                        menu.style.display = &quot;none&quot;;
                        render();
                    };
                    menu.appendChild(item);
                });
            }

            menu.style.display = &quot;block&quot;;
            const rect = anchor.getBoundingClientRect();
            let left = rect.left;
            let top = rect.bottom + window.scrollY;
            
            const menuWidth = menu.offsetWidth;
            const menuHeight = menu.offsetHeight;
            const screenWidth = window.innerWidth;
            const screenHeight = window.innerHeight;
            
            if (left + menuWidth > screenWidth) {
                left = screenWidth - menuWidth - 5;
            }
            if (top + menuHeight > screenHeight) {
                top = rect.top + window.scrollY - menuHeight;
                if (top < 0) top = 5;
            }
            menu.style.left = `${left}px`;
            menu.style.top = `${top}px`;
            
            hideContextMenu();
        }

        function hidePathDropdown() {
            const menu = document.getElementById(&quot;path_dropdown_menu&quot;);
            menu.style.display = &quot;none&quot;;
        }

        function showContextMenu(clientX, clientY, item) {
            const menu = document.getElementById(&quot;context_menu&quot;);
            menu.innerHTML = &quot;&quot;;

            if (item) {
                const isObject = item.el.value &amp;&amp; typeof item.el.value === 'object' &amp;&amp; 'Object' in item.el.value;

                if (state.viewMode === 'nested' &amp;&amp; isObject) {
                    const openItem = document.createElement(&quot;div&quot;);
                    openItem.className = &quot;context-menu-item&quot;;
                    openItem.innerText = &quot;打开&quot;;
                    openItem.onclick = (e) => {
                        e.stopPropagation();
                        state.currentPathArr = [...item.pathArr];
                        state.selectedPath = null;
                        state.selectedPathArr = null;
                        state.searchText = &quot;&quot;;
                        const searchInput = document.getElementById(&quot;search_input&quot;);
                        if (searchInput) searchInput.value = &quot;&quot;;
                        const searchClearBtn = document.getElementById(&quot;search_clear_btn&quot;);
                        if (searchClearBtn) searchClearBtn.style.display = &quot;none&quot;;
                        menu.style.display = &quot;none&quot;;
                        render();
                    };
                    menu.appendChild(openItem);
                }

                const editItem = document.createElement(&quot;div&quot;);
                editItem.className = &quot;context-menu-item&quot;;
                editItem.innerText = &quot;修改变量&quot;;
                editItem.onclick = (e) => {
                    e.stopPropagation();
                    menu.style.display = &quot;none&quot;;
                    openEditForSelected();
                };
                menu.appendChild(editItem);

                const deleteItem = document.createElement(&quot;div&quot;);
                deleteItem.className = &quot;context-menu-item&quot;;
                deleteItem.innerText = &quot;删除&quot;;
                deleteItem.onclick = (e) => {
                    e.stopPropagation();
                    menu.style.display = &quot;none&quot;;
                    state.deleteConfirm = {
                        name: item.el.name,
                        pathArr: item.pathArr
                    };
                    render();
                };
                menu.appendChild(deleteItem);

                const sep = document.createElement(&quot;div&quot;);
                sep.className = &quot;context-menu-separator&quot;;
                menu.appendChild(sep);
            }

            const newItem = document.createElement(&quot;div&quot;);
            newItem.className = &quot;context-menu-item&quot;;
            newItem.innerText = &quot;新建变量&quot;;
            newItem.onclick = (e) => {
                e.stopPropagation();
                menu.style.display = &quot;none&quot;;
                openNewModal();
            };
            menu.appendChild(newItem);

            menu.style.display = &quot;block&quot;;
            const menuWidth = menu.offsetWidth;
            const menuHeight = menu.offsetHeight;
            const screenWidth = window.innerWidth;
            const screenHeight = window.innerHeight;

            let left = clientX;
            let top = clientY;

            if (clientX + menuWidth > screenWidth) {
                left = screenWidth - menuWidth - 5;
            }
            if (clientY + menuHeight > screenHeight) {
                top = screenHeight - menuHeight - 5;
            }

            menu.style.left = `${left}px`;
            menu.style.top = `${top}px`;
            
            hidePathDropdown();
        }

        function hideContextMenu() {
            const menu = document.getElementById(&quot;context_menu&quot;);
            menu.style.display = &quot;none&quot;;
        }

        function saveFile() {
            if (state.elements.length === 0 &amp;&amp; !state.filepath) return;
            try {
                const bytes = serialize_sol(state.elements, state.rawBytes);
                const blob = new Blob([bytes], { type: &quot;application/octet-stream&quot; });
                const url = URL.createObjectURL(blob);
                const a = document.createElement(&quot;a&quot;);
                a.href = url;
                a.download = state.filepath || &quot;NewSol.sol&quot;;
                a.click();
                URL.revokeObjectURL(url);

                state.rawBytes = bytes;
                render();
            } catch (err) {
                alert(&quot;保存失败: &quot; + err);
            }
        }

        function collectAllRecursively(elements, prefix, result) {
            for (const el of elements) {
                const currentPath = prefix === &quot;&quot; ? el.name : `${prefix}.${el.name}`;
                result.push({ path: currentPath, el: el });
                if (el.value &amp;&amp; typeof el.value === 'object' &amp;&amp; 'Object' in el.value) {
                    collectAllRecursively(el.value.Object, currentPath, result);
                }
            }
        }

        function countVars(elements) {
            const result = [];
            collectAllRecursively(elements, &quot;&quot;, result);
            return result.length;
        }

        function getDisplayItems() {
            if (state.viewMode === 'flat') {
                let result = [];
                collectAllRecursively(state.elements, &quot;&quot;, result);

                if (state.searchText) {
                    const search = state.searchText.toLowerCase();
                    result = result.filter(item => {
                        const nameMatch = state.filterMatchName &amp;&amp; item.el.name.toLowerCase().includes(search);
                        const pathMatch = state.filterMatchPath &amp;&amp; item.path.toLowerCase().includes(search);
                        
                        const valStr = getValueString(item.el.value).toLowerCase();
                        const valMatch = state.filterMatchValue &amp;&amp; valStr.includes(search);

                        return nameMatch || pathMatch || valMatch;
                    });
                }
                return result.map(item => ({
                    pathArr: item.path.split('.'),
                    path: item.path,
                    el: item.el
                }));
            } else {
                const currentFolder = getCurrentFolderElements();
                let result = [];

                if (state.searchText) {
                    collectCurrentFolderRecursively(currentFolder, state.currentPathArr, result);
                    const search = state.searchText.toLowerCase();
                    result = result.filter(item => {
                        const nameMatch = state.filterMatchName &amp;&amp; item.el.name.toLowerCase().includes(search);
                        const absolutePath = item.pathArr.join('.');
                        const pathMatch = state.filterMatchPath &amp;&amp; absolutePath.toLowerCase().includes(search);
                        
                        const valStr = getValueString(item.el.value).toLowerCase();
                        const valMatch = state.filterMatchValue &amp;&amp; valStr.includes(search);

                        return nameMatch || pathMatch || valMatch;
                    });
                } else {
                    currentFolder.forEach(el => {
                        result.push({
                            pathArr: [...state.currentPathArr, el.name],
                            el: el
                        });
                    });
                }

                return result.map(item => ({
                    pathArr: item.pathArr,
                    path: item.pathArr.join('.'),
                    el: item.el
                }));
            }
        }

        function countNestedItems(elements) {
            if (!elements || !Array.isArray(elements)) return 0;
            let count = 0;
            for (const el of elements) {
                count++;
                if (el.value &amp;&amp; typeof el.value === 'object' &amp;&amp; 'Object' in el.value) {
                    count += countNestedItems(el.value.Object);
                }
            }
            return count;
        }

        function getValueString(value) {
            if (value === &quot;Null&quot;) return &quot;Null&quot;;
            if (value === &quot;Unsupported&quot;) return &quot;未知&quot;;
            if (typeof value === 'object' &amp;&amp; value !== null) {
                if ('Number' in value) return value.Number.toString();
                if ('String' in value) return value.String;
                if ('Bool' in value) return value.Bool ? &quot;True&quot; : &quot;False&quot;;
                if ('Object' in value) {
                    const totalCount = countNestedItems(value.Object);
                    return `[分类对象 / 包含 ${totalCount} 个项目]`;
                }
                if ('Binary' in value) return `[二进制数据 / ${value.Binary.length} 字节]`;
                if ('Xml' in value) return &quot;[XML 数据]&quot;;
            }
            return &quot;未知&quot;;
        }

        function escapeHtml(str) {
            if (typeof str !== 'string') return str;
            return str.replace(/&amp;/g, &quot;&amp;amp;&quot;).replace(/</g, &quot;&amp;lt;&quot;).replace(/>/g, &quot;&amp;gt;&quot;).replace(/&quot;/g, &quot;&amp;quot;&quot;).replace(/'/g, &quot;&amp;#039;&quot;);
        }

        function getFolderByDotPath(elements, dotPath) {
            if (!dotPath) return elements;
            const segments = dotPath.split('.');
            let current = elements;
            for (const seg of segments) {
                const found = current.find(e => e.name === seg);
                if (!found) return null;
                if (found.value &amp;&amp; typeof found.value === 'object' &amp;&amp; 'Object' in found.value) {
                    current = found.value.Object;
                } else {
                    return null;
                }
            }
            return current;
        }

        function insertOrCreatePath(elements, dotPath, newEl) {
            if (!dotPath) {
                const idx = elements.findIndex(e => e.name === newEl.name);
                if (idx !== -1) elements[idx] = newEl;
                else elements.push(newEl);
                return;
            }
            const segments = dotPath.split('.');
            let current = elements;
            for (const seg of segments) {
                let found = current.find(e => e.name === seg);
                if (!found) {
                    found = { name: seg, value: { Object: [] } };
                    current.push(found);
                }
                if (!(found.value &amp;&amp; typeof found.value === 'object' &amp;&amp; 'Object' in found.value)) {
                    found.value = { Object: [] };
                }
                current = found.value.Object;
            }
            const idx = current.findIndex(e => e.name === newEl.name);
            if (idx !== -1) current[idx] = newEl;
            else current.push(newEl);
        }

        function hasElement(elements, dotPath, name) {
            const fullPath = dotPath ? `${dotPath}.${name}` : name;
            const list = [];
            collectAllRecursively(elements, &quot;&quot;, list);
            return list.some(item => item.path === fullPath);
        }

        function openEditForSelected() {
            if (!state.selectedPath) return;
            const dotPath = state.selectedPath;
            const lastDot = dotPath.lastIndexOf('.');
            const parentPath = lastDot !== -1 ? dotPath.substring(0, lastDot) : &quot;&quot;;
            const targetName = lastDot !== -1 ? dotPath.substring(lastDot + 1) : dotPath;

            const folder = getFolderByDotPath(state.elements, parentPath);
            if (folder) {
                const el = folder.find(e => e.name === targetName);
                if (el) {
                    let valType = 1;
                    let valStr = &quot;&quot;;
                    let valBool = false;

                    if (el.value === &quot;Null&quot; || el.value === &quot;Unsupported&quot;) {
                        // Null
                    } else if (typeof el.value === 'object' &amp;&amp; el.value !== null) {
                        if ('Number' in el.value) {
                            valType = 0;
                            valStr = el.value.Number.toString();
                        } else if ('String' in el.value) {
                            valType = 1;
                            valStr = el.value.String;
                        } else if ('Bool' in el.value) {
                            valType = 2;
                            valBool = el.value.Bool;
                        } else if ('Xml' in el.value) {
                            valType = 3;
                            valStr = el.value.Xml;
                        } else if ('Object' in el.value) {
                            valType = 4;
                        } else if ('Binary' in el.value) {
                            valType = 5;
                            valStr = el.value.Binary.map(b => b.toString(16).toUpperCase().padStart(2, '0')).join(' ');
                        }
                    }

                    state.editModal = { dotPath, name: el.name, valStr, valBool, valType };
                    render();
                }
            }
        }

        function openNewModal() {
            let defaultPath = &quot;&quot;;
            if (state.viewMode === 'nested') {
                defaultPath = state.currentPathArr.join('.');
            } else if (state.selectedPath) {
                const lastDot = state.selectedPath.lastIndexOf('.');
                if (lastDot !== -1) {
                    defaultPath = state.selectedPath.substring(0, lastDot);
                }
            }
            state.newModal = { dotPath: defaultPath, name: &quot;&quot;, valStr: &quot;&quot;, valBool: true, valType: 1 };
            render();
        }

        function renderPathBar() {
            const pathBar = document.getElementById(&quot;path_bar&quot;);
            pathBar.innerHTML = &quot;&quot;;

            const rootNode = document.createElement(&quot;span&quot;);
            rootNode.className = &quot;path-node root-node&quot; + (state.currentPathArr.length === 0 ? &quot; last-node&quot; : &quot;&quot;);
            rootNode.innerText = &quot;根目录&quot;;
            rootNode.onclick = (e) => {
                e.stopPropagation();
                state.currentPathArr = [];
                state.selectedPath = null;
                state.selectedPathArr = null;
                render();
            };
            pathBar.appendChild(rootNode);

            state.currentPathArr.forEach((seg, index) => {
                const sep = document.createElement(&quot;span&quot;);
                sep.className = &quot;path-separator&quot;;
                sep.innerText = &quot; > &quot;;
                sep.onclick = (e) => {
                    e.stopPropagation();
                    showPathDropdown(e.currentTarget, index);
                };

        function positionResizers() {
            const container = document.getElementById('table_container');
            if (!container || container.style.display === 'none') return;
            
            const table = container.querySelector('.sol-table');
            const ths = table.querySelectorAll('thead th');
            const resizers = container.querySelectorAll('.col-resizer');
            
            const containerRect = container.getBoundingClientRect();
            
            ths.forEach((th, index) => {
                if (index === ths.length - 1) return;
                const resizer = resizers[index];
                if (resizer) {
                    const thRect = th.getBoundingClientRect();
                    const left = thRect.right - containerRect.left;
                    resizer.style.left = (left - 4) + 'px';
                }
            });
        }

        function initResizableColumns() {
            const container = document.getElementById('table_container');
            const table = container.querySelector('.sol-table');
            const cols = table.querySelectorAll('colgroup col');
            const ths = table.querySelectorAll('thead th');
            const existing = container.querySelectorAll('.col-resizer');
            existing.forEach(r => r.remove());
            
            ths.forEach((th, index) => {
                if (index === ths.length - 1) return;
                
                const resizer = document.createElement('div');
                resizer.className = 'col-resizer';
                resizer.dataset.index = index;
                container.appendChild(resizer);
                
                let startX;
                let startWidths = [];
                
                resizer.addEventListener('mousedown', (e) => {
                    e.preventDefault();
                    startX = e.clientX;
                    
                    const totalWidth = table.offsetWidth;
                    startWidths[index] = parseFloat(cols[index].style.width) || (ths[index].offsetWidth / totalWidth * 100);
                    startWidths[index + 1] = parseFloat(cols[index + 1].style.width) || (ths[index + 1].offsetWidth / totalWidth * 100);
                    
                    resizer.classList.add('resizing');
                    document.body.style.cursor = 'col-resize';
                    document.body.style.userSelect = 'none';
                    
                    const onMouseMove = (e) => {
                        const currentX = e.clientX;
                        const deltaX = currentX - startX;
                        const deltaPercent = (deltaX / totalWidth) * 100;
                        
                        let newWidthSelf = startWidths[index] + deltaPercent;
                        let newWidthNext = startWidths[index + 1] - deltaPercent;
                        
                        const minPercent = 6;
                        if (newWidthSelf < minPercent) {
                            const diff = minPercent - newWidthSelf;
                            newWidthSelf = minPercent;
                            newWidthNext -= diff;
                        }
                        if (newWidthNext < minPercent) {
                            const diff = minPercent - newWidthNext;
                            newWidthNext = minPercent;
                            newWidthSelf -= diff;
                        }
                        
                        cols[index].style.width = `${newWidthSelf}%`;
                        cols[index + 1].style.width = `${newWidthNext}%`;
                        
                        positionResizers();
                    };
                    
                    const onMouseUp = () => {
                        resizer.classList.remove('resizing');
                        document.body.style.cursor = '';
                        document.body.style.userSelect = '';
                        document.removeEventListener('mousemove', onMouseMove);
                        document.removeEventListener('mouseup', onMouseUp);
                    };
                    
                    document.addEventListener('mousemove', onMouseMove);
                    document.addEventListener('mouseup', onMouseUp);
                });
            });
            
            positionResizers();
        }
