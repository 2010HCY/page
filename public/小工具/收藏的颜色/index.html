  <script>
    const toast = document.getElementById(&quot;toast&quot;);
    let toastTimer = null;

    function showToast() {
      clearTimeout(toastTimer);
      toast.classList.add(&quot;show&quot;);
      toastTimer = setTimeout(() => {
        toast.classList.remove(&quot;show&quot;);
      }, 1200);
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
      } catch {
        const textarea = document.createElement(&quot;textarea&quot;);
        textarea.value = text;
        textarea.style.position = &quot;fixed&quot;;
        textarea.style.opacity = &quot;0&quot;;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand(&quot;copy&quot;);
        textarea.remove();
      }
      showToast();
    }

    document.querySelectorAll(&quot;[data-copy]&quot;).forEach(item => {
      item.addEventListener(&quot;click&quot;, () => {
        copyText(item.dataset.copy);
      });
    });
  </script>

            <script>

                window.fetch = async (url, options) => {

                }
                return originalFetch(url, options);

                infoBtn.addEventListener('click', () => toggleInfoModal(true));
                closeBtn.addEventListener('click', () => toggleInfoModal(false));
                mask.addEventListener('click', () => toggleInfoModal(false));
            }
        });
    </script>
</body>
</html>
