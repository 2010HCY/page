  <div class=&quot;toast&quot; id=&quot;toast&quot;>已复制</div>

  <script>
    const toast = document.getElementById(&quot;toast&quot;);
    const search = document.getElementById(&quot;search&quot;);
    const empty = document.getElementById(&quot;empty&quot;);
    let toastTimer = null;

    function showToast() {
      clearTimeout(toastTimer);
      toast.classList.add(&quot;show&quot;);
      toastTimer = setTimeout(() => {
        toast.classList.remove(&quot;show&quot;);
      }, 1200);
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
      } catch {
        const textarea = document.createElement(&quot;textarea&quot;);
        textarea.value = text;
        textarea.style.position = &quot;fixed&quot;;
        textarea.style.opacity = &quot;0&quot;;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand(&quot;copy&quot;);
        textarea.remove();
      }
    }

    document.querySelectorAll(&quot;.copy-btn&quot;).forEach(button => {
      const icon = button.querySelector(&quot;use&quot;);

      button.addEventListener(&quot;click&quot;, async () => {
        await copyText(button.dataset.copy);

        button.classList.add(&quot;copied&quot;);
        button.dataset.state = &quot;check&quot;;
        icon.setAttribute(&quot;href&quot;, &quot;#icon-check&quot;);
        showToast();

        clearTimeout(button._timer);
        button._timer = setTimeout(() => {
          button.classList.remove(&quot;copied&quot;);
          button.dataset.state = &quot;copy&quot;;
          icon.setAttribute(&quot;href&quot;, &quot;#icon-copy&quot;);
        }, 1800);
      });
    });

    search.addEventListener(&quot;input&quot;, () => {
      const keyword = search.value.trim().toLowerCase();
      let visibleSectionCount = 0;

      document.querySelectorAll(&quot;[data-section]&quot;).forEach(section => {
        let visibleItemCount = 0;
        const sectionText = section.querySelector(&quot;.section-header&quot;).innerText.toLowerCase();

        section.querySelectorAll(&quot;[data-item]&quot;).forEach(item => {
          const itemText = item.innerText.toLowerCase();
          const matched = !keyword || itemText.includes(keyword) || sectionText.includes(keyword);

          item.style.display = matched ? &quot;&quot; : &quot;none&quot;;
          if (matched) visibleItemCount++;
        });

        section.style.display = visibleItemCount > 0 ? &quot;&quot; : &quot;none&quot;;
        if (visibleItemCount > 0) visibleSectionCount++;
      });

      empty.style.display = visibleSectionCount === 0 ? &quot;block&quot; : &quot;none&quot;;
    });
  </script>
</body>
