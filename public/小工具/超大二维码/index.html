    <script>
                document.addEventListener('DOMContentLoaded', function() {
            const infoBtn = document.getElementById('mobileInfoBtn');
            const closeBtn = document.getElementById('mobileCloseBtn');
            const infoModal = document.querySelector('.header-info');
            const mask = document.getElementById('infoMask');

            function toggleInfoModal(show) {
                if (show) {
                    infoModal.classList.add('active');
                    mask.classList.add('active');
                } else {
                    infoModal.classList.remove('active');
                    mask.classList.remove('active');
                }
            }

            if (infoBtn && closeBtn && mask && infoModal) {
                infoBtn.addEventListener('click', () => toggleInfoModal(true));
                closeBtn.addEventListener('click', () => toggleInfoModal(false));
                mask.addEventListener('click', () => toggleInfoModal(false));
            }
        });
    </script>
